name: Test Action

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test-action:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4
        
      - name: Test the action
        id: test
        uses: ./
        with:
          path: '.'
          output-file: 'report.md'
          artifact-name: 'report'
          depsdiver-api-url: ${{ vars.DEPSDIVER_API_URL }}  # Required: DepsDiver API base URL
          depsdiver-token: ${{ secrets.DEPSDIVER_API_TOKEN }}
          foci-threshold: '1'  # Include packages with >50% FOCI change ratio in the report

      - name: Display results
        run: |
          echo "Test completed!"
          echo "Total imports: ${{ steps.test.outputs.total-imports }}"
          echo "Unique imports: ${{ steps.test.outputs.unique-imports }}"
          echo "FOCI packages: ${{ steps.test.outputs.foci-packages }}"
