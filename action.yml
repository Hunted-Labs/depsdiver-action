name: 'Scan Go Imports'
description: 'Scan all Go files in a project and extract all imports'
branding:
  icon: 'search'
  color: 'blue'
inputs:
  path:
    description: 'Directory path to scan (default: repository root)'
    required: false
    default: '.'
  output-file:
    description: 'Output file name for the import report'
    required: false
    default: 'go-imports-report.txt'
  artifact-name:
    description: 'Name of the artifact to upload'
    required: false
    default: 'go-imports-report'
  artifact-retention-days:
    description: 'Number of days to retain the artifact'
    required: false
    default: '30'
  depsdiver-api-url:
    description: 'DepsDiver API base URL (e.g., https://depsdiver.com/api)'
    required: false
    default: ''
  depsdiver-token:
    description: 'DepsDiver API token (should be set as secret)'
    required: false
    default: ''
outputs:
  report-file:
    description: 'Path to the generated report file'
  total-imports:
    description: 'Total number of third-party import statements found (excluding stdlib and GitHub)'
  unique-imports:
    description: 'Number of unique third-party imports found (excluding stdlib and GitHub)'
  github-packages:
    description: 'Number of GitHub packages found'
  stdlib-packages:
    description: 'Number of standard library packages found'
runs:
  using: 'composite'
  steps:
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
      
    - name: Run Go imports scanner
      id: scan
      shell: bash
      env:
        DEPSDIVER_TOKEN: ${{ inputs.depsdiver-token }}
        DEPSDIVER_API_URL: ${{ inputs.depsdiver-api-url }}
        FOCI_SUMMARY_FILE: "${{ github.workspace }}/foci-summary.txt"
      run: |
        # Run the scanner from the action directory
        cd "${{ github.action_path }}"
        go run src/scan-imports.go "${{ github.workspace }}/${{ inputs.path }}" > "${{ github.workspace }}/${{ inputs.output-file }}" 2>&1 || true
        
        # Extract summary stats from the report
        REPORT_PATH="${{ github.workspace }}/${{ inputs.output-file }}"
        if [ -f "$REPORT_PATH" ]; then
          TOTAL=$(grep -E "^Total third-party imports" "$REPORT_PATH" | grep -oE '[0-9]+' || echo "0")
          UNIQUE=$(grep -E "^Unique third-party imports" "$REPORT_PATH" | grep -oE '[0-9]+' || echo "0")
          GITHUB=$(grep -E "^GitHub packages found:" "$REPORT_PATH" | grep -oE '[0-9]+' || echo "0")
          STDLIB=$(grep -E "^Standard library packages found:" "$REPORT_PATH" | grep -oE '[0-9]+' || echo "0")
          echo "total-imports=$TOTAL" >> $GITHUB_OUTPUT
          echo "unique-imports=$UNIQUE" >> $GITHUB_OUTPUT
          echo "github-packages=$GITHUB" >> $GITHUB_OUTPUT
          echo "stdlib-packages=$STDLIB" >> $GITHUB_OUTPUT
          echo "report-file=${{ inputs.output-file }}" >> $GITHUB_OUTPUT
        fi
        
        cat "$REPORT_PATH"
        
    - name: Upload import report
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ github.workspace }}/${{ inputs.output-file }}
        retention-days: ${{ inputs.artifact-retention-days }}
        if-no-files-found: warn
        
    - name: Output summary
      shell: bash
      run: |
        REPORT_PATH="${{ github.workspace }}/${{ inputs.output-file }}"
        FOCI_SUMMARY_PATH="${{ github.workspace }}/foci-summary.txt"
        if [ -f "$REPORT_PATH" ]; then
          # Header with icon
          echo "## 🔍 Go Imports Scan Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Summary statistics table
          echo "<table>" >> $GITHUB_STEP_SUMMARY
          echo "<tr><th>Metric</th><th>Count</th></tr>" >> $GITHUB_STEP_SUMMARY
          echo "<tr><td>📦 Total Third-Party Imports</td><td><strong>${{ steps.scan.outputs.total-imports }}</strong></td></tr>" >> $GITHUB_STEP_SUMMARY
          echo "<tr><td>🔗 Unique Third-Party Imports</td><td><strong>${{ steps.scan.outputs.unique-imports }}</strong></td></tr>" >> $GITHUB_STEP_SUMMARY
          echo "<tr><td>🐙 GitHub Packages</td><td><strong>${{ steps.scan.outputs.github-packages }}</strong></td></tr>" >> $GITHUB_STEP_SUMMARY
          echo "<tr><td>📚 Standard Library Packages</td><td><strong>${{ steps.scan.outputs.stdlib-packages }}</strong></td></tr>" >> $GITHUB_STEP_SUMMARY
          echo "</table>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Add FOCI summary in expandable section if available
          if [ -f "$FOCI_SUMMARY_PATH" ]; then
            echo "<details open>" >> $GITHUB_STEP_SUMMARY
            echo "<summary><strong>🌍 FOCI Analysis Results</strong></summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            cat "$FOCI_SUMMARY_PATH" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          # Download instructions in expandable section
          echo "<details>" >> $GITHUB_STEP_SUMMARY
          echo "<summary><strong>📥 Download Complete Report</strong></summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The complete import report with detailed FOCI analysis has been uploaded as an artifact." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Artifact Name:** \`${{ inputs.artifact-name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Retention:** ${{ inputs.artifact-retention-days }} days" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY
        else
          echo "## 🔍 Go Imports Scan Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> ⚠️ No Go files found in the project." >> $GITHUB_STEP_SUMMARY
        fi

