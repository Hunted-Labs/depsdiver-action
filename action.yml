name: "DepsDiver Dependency FOCI Scanner"
description: "Scan package manager files and query DepsDiver to detect FOCI in your dependencies"
branding:
  icon: "search"
  color: "blue"
inputs:
  path:
    description: "Directory path to scan (default: repository root)"
    required: false
    default: "."
  output-file:
    description: "Output file name for the dependency FOCI report"
    required: false
    default: "deps-foci-report.txt"
  artifact-name:
    description: "Name of the artifact to upload"
    required: false
    default: "deps-foci-report"
  artifact-retention-days:
    description: "Number of days to retain the artifact"
    required: false
    default: "30"
  depsdiver-api-url:
    description: "DepsDiver API base URL (e.g., https://depsdiver.com/api)"
    required: false
    default: ""
  depsdiver-token:
    description: "DepsDiver API token (should be set as secret)"
    required: false
    default: ""
  foci-threshold:
    description: "FOCI change ratio threshold (0-100). Only packages whose change_ratio exceeds this percentage are included in the FOCI report section. Leave empty to include all packages with any FOCI data."
    required: false
    default: ""
outputs:
  report-file:
    description: "Path to the generated report file"
  total-packages:
    description: "Total number of dependencies found across all package manager files"
  foci-packages:
    description: "Number of packages with FOCI detected"
runs:
  using: "composite"
  steps:
    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: "1.26"

    - name: Restore DepsDiver binary cache
      id: binary-cache
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: ${{ runner.temp }}/.depsdiver-bin
        key: depsdiver-bin-${{ runner.os }}-${{ github.action_ref }}

    - name: Build scanner
      if: steps.binary-cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        mkdir -p "${{ runner.temp }}/.depsdiver-bin"
        cd "${{ github.action_path }}"
        go build -o "${{ runner.temp }}/.depsdiver-bin/scan-deps" src/scan-imports.go src/pkg_parsers.go

    - name: Restore DepsDiver cache
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: ${{ runner.temp }}/.depsdiver-cache
        key: depsdiver-${{ runner.os }}-${{ github.run_id }}
        restore-keys: |
          depsdiver-${{ runner.os }}-

    - name: Scan dependencies for FOCI
      id: scan
      shell: bash
      env:
        DEPSDIVER_TOKEN: ${{ inputs.depsdiver-token }}
        DEPSDIVER_API_URL: ${{ inputs.depsdiver-api-url }}
        FOCI_SUMMARY_FILE: "${{ github.workspace }}/foci-summary.txt"
        FOCI_THRESHOLD: ${{ inputs.foci-threshold }}
        DEPSDIVER_CACHE_FILE: "${{ runner.temp }}/.depsdiver-cache/results.json"
        SCAN_PATH: "${{ github.workspace }}/${{ inputs.path }}"
        OUTPUT_FILE: "${{ github.workspace }}/${{ inputs.output-file }}"
        REPORT_ARTIFACT_NAME: "${{ inputs.output-file }}"
      run: |
        # Run the pre-built scanner binary (stderr goes to log, stdout to report)
        "${{ runner.temp }}/.depsdiver-bin/scan-deps" "$SCAN_PATH" > "$OUTPUT_FILE"

        # Extract summary stats from the report
        if [ -f "$OUTPUT_FILE" ]; then
          TOTAL=$(grep -E "^Package manager dependencies found:" "$OUTPUT_FILE" | grep -oE '[0-9]+' || echo "0")
          FOCI=$(grep -E "^FOCI detected:" "$OUTPUT_FILE" | grep -oE '[0-9]+' || echo "0")
          echo "total-packages=$TOTAL" >> $GITHUB_OUTPUT
          echo "foci-packages=$FOCI" >> $GITHUB_OUTPUT
          echo "report-file=$REPORT_ARTIFACT_NAME" >> $GITHUB_OUTPUT
        fi

        cat "$OUTPUT_FILE"

    - name: Upload import report
      if: always()
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ github.workspace }}/${{ inputs.output-file }}
        retention-days: ${{ inputs.artifact-retention-days }}
        if-no-files-found: warn

    - name: Output summary
      if: always()
      shell: bash
      env:
        REPORT_PATH: "${{ github.workspace }}/${{ inputs.output-file }}"
        FOCI_SUMMARY_PATH: "${{ github.workspace }}/foci-summary.txt"
        TOTAL_PACKAGES: ${{ steps.scan.outputs.total-packages }}
        FOCI_PACKAGES: ${{ steps.scan.outputs.foci-packages }}
        FOCI_THRESHOLD: ${{ inputs.foci-threshold }}
        ARTIFACT_NAME: ${{ inputs.artifact-name }}
        ARTIFACT_RETENTION_DAYS: ${{ inputs.artifact-retention-days }}
      run: |
        if [ -f "$REPORT_PATH" ]; then
          # Header with icon
          echo "## 🔍 Dependency FOCI Scan Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Summary statistics table
          echo "<table>" >> $GITHUB_STEP_SUMMARY
          echo "<tr><th>Metric</th><th>Count</th></tr>" >> $GITHUB_STEP_SUMMARY
          echo "<tr><td>Total Packages</td><td><strong>${TOTAL_PACKAGES}</strong></td></tr>" >> $GITHUB_STEP_SUMMARY
          echo "<tr><td>Packages with FOCI</td><td><strong>${FOCI_PACKAGES}</strong></td></tr>" >> $GITHUB_STEP_SUMMARY
          echo "</table>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Add FOCI threshold result if enforcement is enabled
          if [ -n "${FOCI_THRESHOLD}" ]; then
            if [ "${FOCI_PACKAGES:-0}" -gt "0" ]; then
              echo "> **FOCI threshold:** ${FOCI_PACKAGES} package(s) have a FOCI change ratio above ${FOCI_THRESHOLD}%" >> $GITHUB_STEP_SUMMARY
            else
              echo "> **FOCI threshold:** No packages had a FOCI change ratio above ${FOCI_THRESHOLD}%" >> $GITHUB_STEP_SUMMARY
            fi
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          # Add FOCI summary in expandable section if available
          if [ -f "$FOCI_SUMMARY_PATH" ]; then
            echo "<details open>" >> $GITHUB_STEP_SUMMARY
            echo "<summary><strong>🌍 FOCI Analysis Results</strong></summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            cat "$FOCI_SUMMARY_PATH" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          # Download instructions in expandable section
          echo "<details>" >> $GITHUB_STEP_SUMMARY
          echo "<summary><strong>📥 Download Complete Report</strong></summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The complete import report with detailed FOCI analysis has been uploaded as an artifact." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Artifact Name:** \`${ARTIFACT_NAME}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Retention:** ${ARTIFACT_RETENTION_DAYS} days" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY
        else
          echo "## 🔍 Dependency FOCI Scan Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> ⚠️ No package manager files found in the project." >> $GITHUB_STEP_SUMMARY
        fi
