name: 'Scan Go Imports'
description: 'Scan all Go files in a project and extract all imports'
branding:
  icon: 'search'
  color: 'blue'
inputs:
  path:
    description: 'Directory path to scan (default: repository root)'
    required: false
    default: '.'
  output-file:
    description: 'Output file name for the import report'
    required: false
    default: 'go-imports-report.txt'
  artifact-name:
    description: 'Name of the artifact to upload'
    required: false
    default: 'go-imports-report'
  artifact-retention-days:
    description: 'Number of days to retain the artifact'
    required: false
    default: '30'
  hlti-api-url:
    description: 'HLTI API base URL (e.g., https://snarf.huntedlabs.dev/api)'
    required: false
    default: ''
  hlti-token:
    description: 'HLTI API token (should be set as secret)'
    required: false
    default: ''
outputs:
  report-file:
    description: 'Path to the generated report file'
  total-imports:
    description: 'Total number of third-party import statements found (excluding stdlib and GitHub)'
  unique-imports:
    description: 'Number of unique third-party imports found (excluding stdlib and GitHub)'
  github-packages:
    description: 'Number of GitHub packages found'
  stdlib-packages:
    description: 'Number of standard library packages found'
runs:
  using: 'composite'
  steps:
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
      
    - name: Run Go imports scanner
      id: scan
      shell: bash
      env:
        HLTI_TOKEN: ${{ inputs.hlti-token }}
        HLTI_API_URL: ${{ inputs.hlti-api-url }}
        FOCI_SUMMARY_FILE: "${{ github.workspace }}/foci-summary.txt"
      run: |
        # Run the scanner from the action directory
        cd "${{ github.action_path }}"
        go run src/scan-imports.go "${{ github.workspace }}/${{ inputs.path }}" > "${{ github.workspace }}/${{ inputs.output-file }}" 2>&1 || true
        
        # Extract summary stats from the report
        REPORT_PATH="${{ github.workspace }}/${{ inputs.output-file }}"
        if [ -f "$REPORT_PATH" ]; then
          TOTAL=$(grep -E "^Total third-party imports" "$REPORT_PATH" | grep -oE '[0-9]+' || echo "0")
          UNIQUE=$(grep -E "^Unique third-party imports" "$REPORT_PATH" | grep -oE '[0-9]+' || echo "0")
          GITHUB=$(grep -E "^GitHub packages found:" "$REPORT_PATH" | grep -oE '[0-9]+' || echo "0")
          STDLIB=$(grep -E "^Standard library packages found:" "$REPORT_PATH" | grep -oE '[0-9]+' || echo "0")
          echo "total-imports=$TOTAL" >> $GITHUB_OUTPUT
          echo "unique-imports=$UNIQUE" >> $GITHUB_OUTPUT
          echo "github-packages=$GITHUB" >> $GITHUB_OUTPUT
          echo "stdlib-packages=$STDLIB" >> $GITHUB_OUTPUT
          echo "report-file=${{ inputs.output-file }}" >> $GITHUB_OUTPUT
        fi
        
        cat "$REPORT_PATH"
        
    - name: Upload import report
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ github.workspace }}/${{ inputs.output-file }}
        retention-days: ${{ inputs.artifact-retention-days }}
        if-no-files-found: warn
        
    - name: Output summary
      shell: bash
      run: |
        REPORT_PATH="${{ github.workspace }}/${{ inputs.output-file }}"
        FOCI_SUMMARY_PATH="${{ github.workspace }}/foci-summary.txt"
        if [ -f "$REPORT_PATH" ]; then
          echo "## Go Imports Scan Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The complete import report has been generated and uploaded as an artifact." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Total Third-Party Imports:** ${{ steps.scan.outputs.total-imports }}" >> $GITHUB_STEP_SUMMARY
          echo "**Unique Third-Party Imports:** ${{ steps.scan.outputs.unique-imports }}" >> $GITHUB_STEP_SUMMARY
          echo "**GitHub Packages:** ${{ steps.scan.outputs.github-packages }}" >> $GITHUB_STEP_SUMMARY
          echo "**Standard Library Packages:** ${{ steps.scan.outputs.stdlib-packages }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Add FOCI summary if available
          if [ -f "$FOCI_SUMMARY_PATH" ]; then
            cat "$FOCI_SUMMARY_PATH" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "Download the \`${{ inputs.artifact-name }}\` artifact to view the complete report with FOCI analysis." >> $GITHUB_STEP_SUMMARY
        else
          echo "## Go Imports Scan Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "No Go files found in the project." >> $GITHUB_STEP_SUMMARY
        fi

