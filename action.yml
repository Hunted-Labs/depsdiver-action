name: 'DepsDiver Dependency FOCI Scanner'
description: 'Scan package manager files and query DepsDiver to detect FOCI in your dependencies'
branding:
  icon: 'search'
  color: 'blue'
inputs:
  path:
    description: 'Directory path to scan (default: repository root)'
    required: false
    default: '.'
  output-file:
    description: 'Output file name for the dependency FOCI report'
    required: false
    default: 'deps-foci-report.txt'
  artifact-name:
    description: 'Name of the artifact to upload'
    required: false
    default: 'deps-foci-report'
  artifact-retention-days:
    description: 'Number of days to retain the artifact'
    required: false
    default: '30'
  depsdiver-api-url:
    description: 'DepsDiver API base URL (e.g., https://depsdiver.com/api)'
    required: false
    default: ''
  depsdiver-token:
    description: 'DepsDiver API token (should be set as secret)'
    required: false
    default: ''
  foci-threshold:
    description: 'FOCI change ratio threshold (0-100). Only packages whose change_ratio exceeds this percentage are included in the FOCI report section. Leave empty to include all packages with any FOCI data.'
    required: false
    default: ''
outputs:
  report-file:
    description: 'Path to the generated report file'
  total-packages:
    description: 'Total number of dependencies found across all package manager files'
  foci-packages:
    description: 'Number of packages with FOCI detected'
runs:
  using: 'composite'
  steps:
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.21'

    - name: Restore DepsDiver cache
      uses: actions/cache@v4
      with:
        path: ~/.depsdiver-cache
        key: depsdiver-${{ runner.os }}-${{ hashFiles('**/package-lock.json', '**/yarn.lock', '**/Cargo.lock', '**/Gemfile.lock', '**/poetry.lock', '**/Pipfile.lock', '**/go.sum', '**/requirements*.txt', '**/requirements*.lock', '**/pom.xml', '**/build.gradle', '**/build.gradle.kts', '**/*.csproj', '**/*.vbproj', '**/*.fsproj') }}
        restore-keys: |
          depsdiver-${{ runner.os }}-

    - name: Scan dependencies for FOCI
      id: scan
      shell: bash
      env:
        DEPSDIVER_TOKEN: ${{ inputs.depsdiver-token }}
        DEPSDIVER_API_URL: ${{ inputs.depsdiver-api-url }}
        FOCI_SUMMARY_FILE: "${{ github.workspace }}/foci-summary.txt"
        FOCI_THRESHOLD: ${{ inputs.foci-threshold }}
        DEPSDIVER_CACHE_FILE: "$HOME/.depsdiver-cache/results.json"
      run: |
        # Run the scanner from the action directory
        cd "${{ github.action_path }}"
        go run src/scan-imports.go src/pkg_parsers.go "${{ github.workspace }}/${{ inputs.path }}" > "${{ github.workspace }}/${{ inputs.output-file }}" 2>&1

        # Extract summary stats from the report
        REPORT_PATH="${{ github.workspace }}/${{ inputs.output-file }}"
        if [ -f "$REPORT_PATH" ]; then
          TOTAL=$(grep -E "^Package manager dependencies found:" "$REPORT_PATH" | grep -oE '[0-9]+' || echo "0")
          FOCI=$(grep -E "^FOCI detected:" "$REPORT_PATH" | grep -oE '[0-9]+' || echo "0")
          echo "total-packages=$TOTAL" >> $GITHUB_OUTPUT
          echo "foci-packages=$FOCI" >> $GITHUB_OUTPUT
          echo "report-file=${{ inputs.output-file }}" >> $GITHUB_OUTPUT
        fi

        cat "$REPORT_PATH"
        
    - name: Upload import report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ github.workspace }}/${{ inputs.output-file }}
        retention-days: ${{ inputs.artifact-retention-days }}
        if-no-files-found: warn
        
    - name: Output summary
      if: always()
      shell: bash
      run: |
        REPORT_PATH="${{ github.workspace }}/${{ inputs.output-file }}"
        FOCI_SUMMARY_PATH="${{ github.workspace }}/foci-summary.txt"
        if [ -f "$REPORT_PATH" ]; then
          # Header with icon
          echo "## 🔍 Dependency FOCI Scan Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Summary statistics table
          echo "<table>" >> $GITHUB_STEP_SUMMARY
          echo "<tr><th>Metric</th><th>Count</th></tr>" >> $GITHUB_STEP_SUMMARY
          echo "<tr><td>Total Packages</td><td><strong>${{ steps.scan.outputs.total-packages }}</strong></td></tr>" >> $GITHUB_STEP_SUMMARY
          echo "<tr><td>Packages with FOCI</td><td><strong>${{ steps.scan.outputs.foci-packages }}</strong></td></tr>" >> $GITHUB_STEP_SUMMARY
          echo "</table>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Add FOCI threshold result if enforcement is enabled
          if [ -n "${{ inputs.foci-threshold }}" ]; then
            FOCI_COUNT="${{ steps.scan.outputs.foci-packages }}"
            THRESHOLD="${{ inputs.foci-threshold }}"
            if [ "${FOCI_COUNT:-0}" -gt "0" ]; then
              echo "> **FOCI threshold:** ${FOCI_COUNT} package(s) have a FOCI change ratio above ${THRESHOLD}%" >> $GITHUB_STEP_SUMMARY
            else
              echo "> **FOCI threshold:** No packages had a FOCI change ratio above ${THRESHOLD}%" >> $GITHUB_STEP_SUMMARY
            fi
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          # Add FOCI summary in expandable section if available
          if [ -f "$FOCI_SUMMARY_PATH" ]; then
            echo "<details open>" >> $GITHUB_STEP_SUMMARY
            echo "<summary><strong>🌍 FOCI Analysis Results</strong></summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            cat "$FOCI_SUMMARY_PATH" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          # Download instructions in expandable section
          echo "<details>" >> $GITHUB_STEP_SUMMARY
          echo "<summary><strong>📥 Download Complete Report</strong></summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The complete import report with detailed FOCI analysis has been uploaded as an artifact." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Artifact Name:** \`${{ inputs.artifact-name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Retention:** ${{ inputs.artifact-retention-days }} days" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY
        else
          echo "## 🔍 Dependency FOCI Scan Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> ⚠️ No package manager files found in the project." >> $GITHUB_STEP_SUMMARY
        fi

